name: Daily Starlink Data Ingestion

on:
  schedule:
    # Runs every day at 06:00 UTC (CelesTrak updates data several times/day)
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: python ingest.py

      - name: Notify on failure
        if: failure()
        run: echo "::error::Ingestion failed! Check logs above."
