name: Sync SpaceX Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: spacex-assets-sync
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Required Secrets
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing required secret: DATABASE_URL"
            exit 1
          fi

      - name: Verify DB Connectivity And Schema
        run: |
          python - <<'PY'
          import os
          import psycopg

          db_url = os.environ["DATABASE_URL"]
          with psycopg.connect(db_url) as conn:
              with conn.cursor() as cur:
                  cur.execute("SELECT 1")
                  cur.execute(open("backend/Schema.sql", "r", encoding="utf-8").read())
              conn.commit()
          print("DB connectivity + schema check OK")
          PY

      - name: Seed SpaceX Asset Baseline
        run: python backend/seed_spacex_assets.py

      - name: Sync Latest SpaceXNow Data
        run: python backend/sync_spacex_assets.py
